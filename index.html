<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>M210 Prüfung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>🚗 Fahrzeug-Status</h1>
        <div id="data">Warte auf Daten...</div>
        <button onclick="fetchData()">Aktualisieren</button>
    </div>
    <script>
        const url = "https://cbydgitsycukdj5gc2kciemale0rjrxu.lambda-url.us-east-1.on.aws/";
        async function fetchData() {
            const d = document.getElementById('data');
            try {
                const r = await fetch(url);
                const res = await r.json();
                d.innerHTML = `<strong>Auto:</strong> ${res.auto}<br><strong>Besitzer:</strong> ${res.besitzer}<br><small style="color:green;">${res.status}</small>`;
            } catch (e) { d.innerHTML = "<span style='color:red;'>Backend-Fehler!</span>"; }
        }
        fetchData();
    </script>
</body>
</html>
