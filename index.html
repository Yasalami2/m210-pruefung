<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M210 Prüfung - Terraform Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>🚗 Cloud Daten</h1>
        <div id="data">Lade Daten vom Backend...</div>
        <button onclick="fetchData()">Aktualisieren</button>
    </div>

    <script>
        // HIER KOMMT SPÄTER DEINE TERRAFORM LAMBDA URL REIN!
        const API_URL = "HIER_URL_EINFÜGEN";

        async function fetchData() {
            const display = document.getElementById('data');
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                display.innerHTML = `
                    <strong>Auto:</strong> ${result.auto} <br>
                    <strong>Besitzer:</strong> ${result.besitzer} <br>
                    <small style="color:green;">${result.status}</small>
                `;
            } catch (error) {
                display.innerHTML = "<span style='color:red;'>Warte auf echte Lambda URL...</span>";
            }
        }
        fetchData();
    </script>
</body>
</html>
