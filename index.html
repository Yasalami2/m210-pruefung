<!DOCTYPE html>
<html>
<body>
    <h1>Auto-Prüfung</h1>
    <button onclick="check()">Backend testen</button>
    <p id="out"></p>
    <script>
        async function check() {
            const res = await fetch("DEINE_URL_HIER");
            const data = await res.json();
            document.getElementById("out").innerText = data.message;
        }
    </script>
</body>
</html>
